# Networking — Certificate (certificate.yaml).
suite: generic-app-chart Certificate
templates:
  - certificate.yaml
tests:
  - it: renders no Certificate when routing is disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: renders no Certificate when routing is enabled but TLS is disabled
    set:
      routing:
        enabled: true
        hostnames: ["my-app.dackota.dev"]
        tls:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a Certificate with dnsNames from the route hosts, a letsencrypt ClusterIssuer, and a target secretName
    release:
      name: my-app
    set:
      routing:
        enabled: true
        hostnames: ["my-app.dackota.dev", "alt.dackota.dev"]
    asserts:
      - isKind:
          of: Certificate
      - isAPIVersion:
          of: cert-manager.io/v1
      - equal:
          path: spec.dnsNames
          value: ["my-app.dackota.dev", "alt.dackota.dev"]
      - equal:
          path: spec.issuerRef
          value:
            name: letsencrypt
            kind: ClusterIssuer
      - equal:
          path: spec.secretName
          value: my-app-generic-app-chart-tls

  - it: honors an explicit secretName and issuerRef override
    set:
      routing:
        enabled: true
        hostnames: ["my-app.dackota.dev"]
        tls:
          enabled: true
          secretName: custom-tls-secret
          issuerRef:
            name: custom-issuer
            kind: ClusterIssuer
    asserts:
      - equal:
          path: spec.secretName
          value: custom-tls-secret
      - equal:
          path: spec.issuerRef.name
          value: custom-issuer

  # Generic metadata passthrough.
  - it: adds commonLabels and commonAnnotations to the Certificate
    set:
      routing:
        enabled: true
        hostnames: ["my-app.dackota.dev"]
      commonLabels:
        team: platform
      commonAnnotations:
        owner: platform-team
    asserts:
      - equal:
          path: metadata.labels["team"]
          value: platform
      - equal:
          path: metadata.annotations["owner"]
          value: platform-team
