# M1 naming/labels (_helpers.tpl) — R2. Cross-cutting: every rendered resource
# must derive its name from release+chart (overridable via fullnameOverride/
# nameOverride) and carry the same common + selector labels. Exercised here
# against deployment.yaml; other modules' suites re-assert the same helper
# output as each resource is added, proving the helper is applied consistently.
suite: generic-app-chart naming and labels (M1)
templates:
  - deployment.yaml
tests:
  - it: derives the fullname from release name and chart name by default
    release:
      name: my-app
    asserts:
      - equal:
          path: metadata.name
          value: my-app-generic-app-chart

  - it: does not double the chart name when the release name already contains it
    release:
      name: my-generic-app-chart
    asserts:
      - equal:
          path: metadata.name
          value: my-generic-app-chart

  - it: honors fullnameOverride over the derived name
    release:
      name: my-app
    set:
      fullnameOverride: custom-name
    asserts:
      - equal:
          path: metadata.name
          value: custom-name

  - it: honors nameOverride when deriving the fullname
    release:
      name: my-app
    set:
      nameOverride: widget
    asserts:
      - equal:
          path: metadata.name
          value: my-app-widget

  - it: applies standard Helm common labels
    release:
      name: my-app
    chart:
      version: 1.2.3
      appVersion: "9.9.9"
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: generic-app-chart
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: my-app
      - equal:
          path: metadata.labels["app.kubernetes.io/version"]
          value: "9.9.9"
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
      - equal:
          path: metadata.labels["helm.sh/chart"]
          value: generic-app-chart-1.2.3

  - it: uses stable selector labels that match the pod template labels
    release:
      name: my-app
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: generic-app-chart
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: my-app
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/name"]
          value: generic-app-chart
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/instance"]
          value: my-app
