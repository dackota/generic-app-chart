# R31: named scenario values files exercise the whole rendered surface
# together, rather than each module in isolation. `default.yaml` is the
# minimal/base case; `persistent.yaml` is the persistence-enabled case;
# `autoscaling.yaml`, `networkpolicy.yaml`, `cluster-only.yaml`, and
# `full.yaml` exercise the networking-operational-addons task's routing/TLS,
# HPA, PDB, and NetworkPolicy paths.
suite: generic-app-chart scenario values files (R31)
templates:
  - deployment.yaml
  - service.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - pvc.yaml
  - hpa.yaml
  - pdb.yaml
  - networkpolicy.yaml
  - httproute.yaml
  - certificate.yaml
  - referencegrant.yaml
tests:
  - it: renders a coherent app from the default scenario
    values:
      - ./values/default.yaml
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
        template: deployment.yaml
      - containsDocument:
          kind: Service
          apiVersion: v1
        template: service.yaml
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
        template: serviceaccount.yaml
      - hasDocuments:
          count: 0
        template: pvc.yaml
      - equal:
          path: spec.replicas
          value: 1
        template: deployment.yaml
      - notExists:
          path: spec.strategy
        template: deployment.yaml

  - it: renders a coherent stateful app from the persistent scenario
    values:
      - ./values/persistent.yaml
    asserts:
      - containsDocument:
          kind: PersistentVolumeClaim
          apiVersion: v1
        template: pvc.yaml
      - equal:
          path: spec.replicas
          value: 1
        template: deployment.yaml
      - equal:
          path: spec.strategy.type
          value: Recreate
        template: deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
          any: true
        template: deployment.yaml

  - it: renders a scaling, autoscaled app from the autoscaling scenario
    values:
      - ./values/autoscaling.yaml
    asserts:
      - containsDocument:
          kind: HorizontalPodAutoscaler
          apiVersion: autoscaling/v2
        template: hpa.yaml
      - notExists:
          path: spec.replicas
        template: deployment.yaml
      - hasDocuments:
          count: 0
        template: pvc.yaml

  - it: renders a network-isolated app from the networkpolicy scenario
    values:
      - ./values/networkpolicy.yaml
    asserts:
      - containsDocument:
          kind: NetworkPolicy
          apiVersion: networking.k8s.io/v1
        template: networkpolicy.yaml
      - contains:
          path: spec.policyTypes
          content: Ingress
        template: networkpolicy.yaml

  - it: renders an internal, network-isolated app with no routing surface from the cluster-only scenario
    values:
      - ./values/cluster-only.yaml
    asserts:
      - containsDocument:
          kind: Service
          apiVersion: v1
        template: service.yaml
      - containsDocument:
          kind: NetworkPolicy
          apiVersion: networking.k8s.io/v1
        template: networkpolicy.yaml
      - hasDocuments:
          count: 0
        template: httproute.yaml
      - hasDocuments:
          count: 0
        template: certificate.yaml
      - hasDocuments:
          count: 0
        template: referencegrant.yaml

  - it: renders every feature together from the full scenario, honoring the cross-namespace ReferenceGrant
    release:
      namespace: ctd
    values:
      - ./values/full.yaml
    asserts:
      - containsDocument:
          kind: HTTPRoute
          apiVersion: gateway.networking.k8s.io/v1
        template: httproute.yaml
      - containsDocument:
          kind: Certificate
          apiVersion: cert-manager.io/v1
        template: certificate.yaml
      - containsDocument:
          kind: ReferenceGrant
          apiVersion: gateway.networking.k8s.io/v1beta1
        template: referencegrant.yaml
      - containsDocument:
          kind: HorizontalPodAutoscaler
          apiVersion: autoscaling/v2
        template: hpa.yaml
      - containsDocument:
          kind: PodDisruptionBudget
          apiVersion: policy/v1
        template: pdb.yaml
      - containsDocument:
          kind: NetworkPolicy
          apiVersion: networking.k8s.io/v1
        template: networkpolicy.yaml
      - notExists:
          path: spec.replicas
        template: deployment.yaml
      - hasDocuments:
          count: 0
        template: pvc.yaml
      # R38/R44: autoscaling's minReplicas (2) floors the effective replica
      # count above 1 even though replicaCount is left at its default, so the
      # default anti-affinity must render here too — the PDB and the
      # anti-affinity gate must agree on "multi-replica".
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].podAffinityTerm.topologyKey
          value: kubernetes.io/hostname
        template: deployment.yaml
