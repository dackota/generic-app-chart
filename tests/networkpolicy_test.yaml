# NetworkPolicy (networkpolicy.yaml).
suite: generic-app-chart NetworkPolicy
templates:
  - networkpolicy.yaml
tests:
  - it: renders no NetworkPolicy when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a default-deny-ingress NetworkPolicy scoped to this app's pods, allowing only the configured gateway namespace, when enabled
    release:
      name: my-app
    set:
      networkPolicy:
        enabled: true
    asserts:
      - isKind:
          of: NetworkPolicy
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/name"]
          value: generic-app-chart
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/instance"]
          value: my-app
      - contains:
          path: spec.policyTypes
          content: Ingress
      - notContains:
          path: spec.policyTypes
          content: Egress
          any: true
      - equal:
          path: spec.ingress[0].from[0].namespaceSelector.matchLabels["kubernetes.io/metadata.name"]
          value: traefik
      - notExists:
          path: spec.egress

  - it: honors a custom gateway namespaceSelector and podSelector
    set:
      networkPolicy:
        enabled: true
        gateway:
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: custom-gateway-ns
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
    asserts:
      - equal:
          path: spec.ingress[0].from[0].namespaceSelector.matchLabels["kubernetes.io/metadata.name"]
          value: custom-gateway-ns
      - equal:
          path: spec.ingress[0].from[0].podSelector.matchLabels["app.kubernetes.io/name"]
          value: traefik

  - it: adds Egress to policyTypes and renders the configured egress rules when additionalEgress is set
    set:
      networkPolicy:
        enabled: true
        additionalEgress:
          - to:
              - namespaceSelector: {}
            ports:
              - protocol: UDP
                port: 53
    asserts:
      - contains:
          path: spec.policyTypes
          content: Egress
      - equal:
          path: spec.egress
          value:
            - to:
                - namespaceSelector: {}
              ports:
                - protocol: UDP
                  port: 53

  # Generic metadata passthrough.
  - it: adds commonLabels and commonAnnotations to the NetworkPolicy
    set:
      networkPolicy:
        enabled: true
      commonLabels:
        team: platform
      commonAnnotations:
        owner: platform-team
    asserts:
      - equal:
          path: metadata.labels["team"]
          value: platform
      - equal:
          path: metadata.annotations["owner"]
          value: platform-team
