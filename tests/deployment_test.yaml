# M3 workload (deployment.yaml) — R1, R3-R8, R13.
suite: generic-app-chart Deployment (M3 workload)
templates:
  - deployment.yaml
  - configmap.yaml
tests:
  - it: renders the container image from repository and tag
    template: deployment.yaml
    set:
      image.repository: ghcr.io/dackota/podinfo
      image.tag: "6.5.0"
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/dackota/podinfo:6.5.0

  - it: defaults the image tag to the chart appVersion when unset
    template: deployment.yaml
    set:
      image.repository: ghcr.io/dackota/podinfo
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/dackota/podinfo:1.0.0

  - it: renders the configured pull policy
    template: deployment.yaml
    set:
      image.repository: ghcr.io/dackota/podinfo
      image.pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: omits command and args when unset (R3)
    template: deployment.yaml
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].command
      - notExists:
          path: spec.template.spec.containers[0].args

  - it: renders command and args when set via values (R3)
    template: deployment.yaml
    set:
      command: ["/bin/sh"]
      args: ["-c", "echo hi"]
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value: ["/bin/sh"]
      - equal:
          path: spec.template.spec.containers[0].args
          value: ["-c", "echo hi"]

  - it: renders plain environment variables from values (R4)
    template: deployment.yaml
    set:
      env:
        - name: LOG_LEVEL
          value: debug
        - name: PORT
          value: "8080"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env
          value:
            - name: LOG_LEVEL
              value: debug
            - name: PORT
              value: "8080"

  - it: renders individual env entries sourced from secretKeyRef/configMapKeyRef (R6)
    template: deployment.yaml
    set:
      env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: existing-db-secret
              key: password
        - name: FEATURE_FLAG
          valueFrom:
            configMapKeyRef:
              name: existing-feature-config
              key: flag
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.name
          value: existing-db-secret
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.key
          value: password
      - equal:
          path: spec.template.spec.containers[0].env[1].valueFrom.configMapKeyRef.name
          value: existing-feature-config

  - it: renders envFrom entries referencing existing secretRef/configMapRef by name (R5)
    template: deployment.yaml
    set:
      envFrom:
        - secretRef:
            name: existing-app-secret
        - configMapRef:
            name: existing-app-config
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].secretRef.name
          value: existing-app-secret
      - equal:
          path: spec.template.spec.containers[0].envFrom[1].configMapRef.name
          value: existing-app-config

  - it: omits env and envFrom when unset
    template: deployment.yaml
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].env
      - notExists:
          path: spec.template.spec.containers[0].envFrom

  - it: omits probes when unset (R7)
    template: deployment.yaml
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].livenessProbe
      - notExists:
          path: spec.template.spec.containers[0].readinessProbe
      - notExists:
          path: spec.template.spec.containers[0].startupProbe

  - it: renders an http liveness probe when defined (R7)
    template: deployment.yaml
    set:
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 5
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.initialDelaySeconds
          value: 5

  - it: renders a tcp readiness probe when defined (R7)
    template: deployment.yaml
    set:
      readinessProbe:
        tcpSocket:
          port: 8080
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.tcpSocket.port
          value: 8080

  - it: renders an exec startup probe when defined (R7)
    template: deployment.yaml
    set:
      startupProbe:
        exec:
          command: ["cat", "/tmp/ready"]
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.exec.command
          value: ["cat", "/tmp/ready"]

  - it: always sets sane default resource requests and limits (R8)
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 128Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 500m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 256Mi

  - it: allows fully overriding resources via values (R8)
    template: deployment.yaml
    set:
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 250m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 1Gi

  - it: references the chart's ServiceAccount from the pod spec (R14)
    template: deployment.yaml
    release:
      name: my-app
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: my-app-generic-app-chart

  - it: references an overridden ServiceAccount name from the pod spec (R14)
    template: deployment.yaml
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: custom-sa

  - it: maps declared service ports onto the container's ports (R15)
    template: deployment.yaml
    set:
      service.ports:
        - name: http
          port: 80
          targetPort: 8080
          protocol: TCP
        - name: metrics
          port: 9090
          targetPort: 9090
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080
      - equal:
          path: spec.template.spec.containers[0].ports[0].protocol
          value: TCP
      - equal:
          path: spec.template.spec.containers[0].ports[1].containerPort
          value: 9090

  - it: adds a config checksum annotation to the pod template when config is set (R17)
    template: deployment.yaml
    set:
      config:
        LOG_LEVEL: debug
    asserts:
      - matchRegex:
          path: spec.template.metadata.annotations["checksum/config"]
          pattern: "^[0-9a-f]{64}$"

  - it: omits the config checksum annotation when no config is set
    template: deployment.yaml
    asserts:
      - notExists:
          path: spec.template.metadata.annotations

  # Golden-value pair (R17): independently rendered once via `helm template
  # myrelease . --set config.LOG_LEVEL=<value> -s templates/deployment.yaml`
  # and pinned here. Proves the checksum is sensitive to config content (i.e.
  # editing config actually changes the annotation and so triggers a
  # rollout), not just that it exists.
  - it: pins the checksum for a known config payload (golden value)
    template: deployment.yaml
    release:
      name: myrelease
    set:
      config:
        LOG_LEVEL: debug
    asserts:
      - equal:
          path: spec.template.metadata.annotations["checksum/config"]
          value: 5dca1b4971fcf24f18b601f3ea7006249acb16174bd63afaf610e21e07b4bccf

  - it: changes the checksum when config content changes (R17)
    template: deployment.yaml
    release:
      name: myrelease
    set:
      config:
        LOG_LEVEL: verbose
    asserts:
      - equal:
          path: spec.template.metadata.annotations["checksum/config"]
          value: d5eb15b7a1e03c3244d587e0e1662dab7e72e024d9027f0916be87353ee66714
      - notEqual:
          path: spec.template.metadata.annotations["checksum/config"]
          value: 5dca1b4971fcf24f18b601f3ea7006249acb16174bd63afaf610e21e07b4bccf

  # R39 generic metadata passthrough.
  - it: adds commonAnnotations to the Deployment's own metadata (R39)
    template: deployment.yaml
    set:
      commonAnnotations:
        team: platform
    asserts:
      - equal:
          path: metadata.annotations["team"]
          value: platform

  - it: adds podLabels to the pod template merged with chart-managed pod labels, dropping none (R39)
    template: deployment.yaml
    release:
      name: my-app
    set:
      podLabels:
        tier: backend
    asserts:
      - equal:
          path: spec.template.metadata.labels["tier"]
          value: backend
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/name"]
          value: generic-app-chart
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/instance"]
          value: my-app

  # R39 property test: podLabels must never clobber the chart-managed pod
  # labels that the Deployment's own selector depends on.
  - it: never lets podLabels override chart-managed pod label keys (R39)
    template: deployment.yaml
    release:
      name: my-app
    set:
      podLabels:
        app.kubernetes.io/name: hijacked
        app.kubernetes.io/instance: hijacked
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/name"]
          value: generic-app-chart
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/instance"]
          value: my-app

  # R39 regression: podLabels is the more specific source and must win over
  # commonLabels for the same non-reserved key on the pod template — the
  # opposite precedence would silently discard a user's pod-specific override.
  - it: lets podLabels win over commonLabels for the same key on the pod template (R39)
    template: deployment.yaml
    release:
      name: my-app
    set:
      commonLabels:
        team: from-common
      podLabels:
        team: from-pod
    asserts:
      - equal:
          path: spec.template.metadata.labels["team"]
          value: from-pod

  - it: still lets commonLabels reach the pod template when podLabels does not set that key (R39)
    template: deployment.yaml
    release:
      name: my-app
    set:
      commonLabels:
        team: from-common
    asserts:
      - equal:
          path: spec.template.metadata.labels["team"]
          value: from-common

  - it: adds podAnnotations to the pod template without dropping the checksum/config annotation (R39, R17)
    template: deployment.yaml
    set:
      config:
        LOG_LEVEL: debug
      podAnnotations:
        vault.hashicorp.com/agent-inject: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["vault.hashicorp.com/agent-inject"]
          value: "true"
      - matchRegex:
          path: spec.template.metadata.annotations["checksum/config"]
          pattern: "^[0-9a-f]{64}$"

  - it: renders podAnnotations on the pod template even when no config is set (R39)
    template: deployment.yaml
    set:
      podAnnotations:
        vault.hashicorp.com/agent-inject: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["vault.hashicorp.com/agent-inject"]
          value: "true"
      - notExists:
          path: spec.template.metadata.annotations["checksum/config"]

  # R39 property test: podAnnotations/commonAnnotations must never be able to
  # override the checksum/config annotation that drives the config-rollout
  # trigger (R17) — a clobbered checksum would silently stop pods from
  # restarting on config changes.
  - it: never lets podAnnotations override the checksum/config annotation (R39, R17)
    template: deployment.yaml
    set:
      config:
        LOG_LEVEL: debug
      podAnnotations:
        checksum/config: hijacked
    asserts:
      - matchRegex:
          path: spec.template.metadata.annotations["checksum/config"]
          pattern: "^[0-9a-f]{64}$"

  - it: never lets commonAnnotations override the checksum/config annotation (R39, R17)
    template: deployment.yaml
    set:
      config:
        LOG_LEVEL: debug
      commonAnnotations:
        checksum/config: hijacked
    asserts:
      - matchRegex:
          path: spec.template.metadata.annotations["checksum/config"]
          pattern: "^[0-9a-f]{64}$"

  - it: merges commonAnnotations into the pod template alongside podAnnotations (R39)
    template: deployment.yaml
    set:
      commonAnnotations:
        team: platform
      podAnnotations:
        vault.hashicorp.com/agent-inject: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["team"]
          value: platform
      - equal:
          path: spec.template.metadata.annotations["vault.hashicorp.com/agent-inject"]
          value: "true"

  # R40 observability surface: Prometheus scrape annotations, rendered via
  # the R39 podAnnotations mechanism.
  - it: omits Prometheus scrape annotations when metrics.scrape is disabled by default (R40)
    template: deployment.yaml
    asserts:
      - notExists:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]

  - it: renders prometheus.io/scrape|port|path pod annotations when metrics.scrape is enabled (R40)
    template: deployment.yaml
    set:
      metrics:
        scrape:
          enabled: true
          port: 9797
          path: /custom-metrics
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/port"]
          value: "9797"
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/path"]
          value: /custom-metrics

  - it: merges scrape annotations with existing podAnnotations/commonAnnotations without dropping either (R40, R39)
    template: deployment.yaml
    set:
      metrics:
        scrape:
          enabled: true
      commonAnnotations:
        team: platform
      podAnnotations:
        vault.hashicorp.com/agent-inject: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
      - equal:
          path: spec.template.metadata.annotations["team"]
          value: platform
      - equal:
          path: spec.template.metadata.annotations["vault.hashicorp.com/agent-inject"]
          value: "true"

  # R40 property test: the metrics block must never panic the render when a
  # caller explicitly nulls it out or an intermediate key (the
  # "nulled-intermediate-key" bug class) — the chart must fall back to its
  # off-by-default behavior instead of crashing.
  - it: never panics and stays off by default when metrics is explicitly nulled (R40 robustness)
    template: deployment.yaml
    set:
      metrics: null
    asserts:
      - notExists:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]

  - it: never panics and stays off by default when metrics.scrape is explicitly nulled (R40 robustness)
    template: deployment.yaml
    set:
      metrics:
        scrape: null
    asserts:
      - notExists:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
