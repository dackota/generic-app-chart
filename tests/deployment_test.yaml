# Workload (deployment.yaml).
suite: generic-app-chart Deployment
templates:
  - deployment.yaml
  - configmap.yaml
tests:
  - it: renders the container image from repository and tag
    template: deployment.yaml
    set:
      image.repository: ghcr.io/dackota/podinfo
      image.tag: "6.5.0"
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/dackota/podinfo:6.5.0

  - it: defaults the image tag to the chart appVersion when unset
    template: deployment.yaml
    set:
      image.repository: ghcr.io/dackota/podinfo
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/dackota/podinfo:1.0.0

  - it: renders the configured pull policy
    template: deployment.yaml
    set:
      image.repository: ghcr.io/dackota/podinfo
      image.pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: omits command and args when unset
    template: deployment.yaml
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].command
      - notExists:
          path: spec.template.spec.containers[0].args

  - it: renders command and args when set via values
    template: deployment.yaml
    set:
      command: ["/bin/sh"]
      args: ["-c", "echo hi"]
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value: ["/bin/sh"]
      - equal:
          path: spec.template.spec.containers[0].args
          value: ["-c", "echo hi"]

  - it: renders plain environment variables from values
    template: deployment.yaml
    set:
      env:
        - name: LOG_LEVEL
          value: debug
        - name: PORT
          value: "8080"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env
          value:
            - name: LOG_LEVEL
              value: debug
            - name: PORT
              value: "8080"

  - it: renders individual env entries sourced from secretKeyRef/configMapKeyRef
    template: deployment.yaml
    set:
      env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: existing-db-secret
              key: password
        - name: FEATURE_FLAG
          valueFrom:
            configMapKeyRef:
              name: existing-feature-config
              key: flag
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.name
          value: existing-db-secret
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.key
          value: password
      - equal:
          path: spec.template.spec.containers[0].env[1].valueFrom.configMapKeyRef.name
          value: existing-feature-config

  - it: renders envFrom entries referencing existing secretRef/configMapRef by name
    template: deployment.yaml
    set:
      envFrom:
        - secretRef:
            name: existing-app-secret
        - configMapRef:
            name: existing-app-config
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].secretRef.name
          value: existing-app-secret
      - equal:
          path: spec.template.spec.containers[0].envFrom[1].configMapRef.name
          value: existing-app-config

  - it: omits env and envFrom when unset
    template: deployment.yaml
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].env
      - notExists:
          path: spec.template.spec.containers[0].envFrom

  - it: omits liveness and startup probes when unset, never defaulting them
    template: deployment.yaml
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].livenessProbe
      - notExists:
          path: spec.template.spec.containers[0].startupProbe

  - it: defaults readinessProbe to a tcpSocket check on the primary service port when unset
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.tcpSocket.port
          value: 8080
      - notExists:
          path: spec.template.spec.containers[0].readinessProbe.httpGet

  - it: renders an http liveness probe when defined
    template: deployment.yaml
    set:
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 5
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.initialDelaySeconds
          value: 5

  - it: renders a tcp readiness probe when defined
    template: deployment.yaml
    set:
      readinessProbe:
        tcpSocket:
          port: 8080
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.tcpSocket.port
          value: 8080

  - it: renders an exec startup probe when defined
    template: deployment.yaml
    set:
      startupProbe:
        exec:
          command: ["cat", "/tmp/ready"]
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.exec.command
          value: ["cat", "/tmp/ready"]

  - it: renders an httpGet probe from the path/port shorthand
    template: deployment.yaml
    set:
      livenessProbe:
        path: /healthz
        port: 8081
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 8081
      - notExists:
          path: spec.template.spec.containers[0].livenessProbe.tcpSocket

  - it: renders a tcpSocket probe from the port-only shorthand
    template: deployment.yaml
    set:
      startupProbe:
        port: 9090
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.tcpSocket.port
          value: 9090
      - notExists:
          path: spec.template.spec.containers[0].startupProbe.httpGet

  - it: passes extra native Probe fields through the shorthand
    template: deployment.yaml
    set:
      readinessProbe:
        path: /ready
        port: 8080
        initialDelaySeconds: 3
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /ready
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.initialDelaySeconds
          value: 3

  - it: a shorthand readinessProbe overrides the default tcpSocket probe
    template: deployment.yaml
    set:
      readinessProbe:
        path: /ready
        port: 9091
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 9091
      - notExists:
          path: spec.template.spec.containers[0].readinessProbe.tcpSocket

  - it: a raw native readinessProbe block overrides the default tcpSocket probe
    template: deployment.yaml
    set:
      readinessProbe:
        httpGet:
          path: /ready
          port: 9092
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /ready
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 9092
      - notExists:
          path: spec.template.spec.containers[0].readinessProbe.tcpSocket

  - it: renders a probe path containing a literal colon-space instead of crashing the chart (CRITICAL #1)
    template: deployment.yaml
    set:
      readinessProbe:
        path: "/healthz: bad"
        port: 8080
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: "/healthz: bad"

  - it: passes a non-scalar extra Probe field through the shorthand without mangling it (CRITICAL #1)
    template: deployment.yaml
    set:
      readinessProbe:
        path: /ready
        port: 8080
        httpHeaders:
          - name: X-Custom
            value: foo
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /ready
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpHeaders
          value:
            - name: X-Custom
              value: foo

  - it: omits stray shorthand keys from a raw probe block instead of leaking them as invalid siblings (MEDIUM)
    template: deployment.yaml
    set:
      readinessProbe:
        httpGet:
          path: /ready
          port: 9092
        path: stale-shorthand-value
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /ready
      - notExists:
          path: spec.template.spec.containers[0].readinessProbe.path

  - it: honors an explicit port 0 in the probe shorthand instead of falling back to the primary service port (HIGH)
    template: deployment.yaml
    set:
      startupProbe:
        port: 0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.tcpSocket.port
          value: 0

  - it: fails fast instead of rendering a broken empty-port probe when service.ports is empty (CRITICAL #2)
    template: deployment.yaml
    set:
      service.ports: []
    asserts:
      - failedTemplate:
          errorMessage: "generic-app-chart: readinessProbe has no port to probe — set service.ports or the probe's own port field"

  - it: configuring probes never alters the security context or other pod fields
    template: deployment.yaml
    set:
      livenessProbe:
        path: /healthz
        port: 8080
      readinessProbe:
        path: /ready
        port: 8080
      startupProbe:
        port: 8080
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-generic-app-chart

  - it: always sets sane default resource requests and limits
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 128Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 500m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 256Mi

  - it: allows fully overriding resources via values
    template: deployment.yaml
    set:
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 250m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 1Gi

  - it: references the chart's ServiceAccount from the pod spec
    template: deployment.yaml
    release:
      name: my-app
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: my-app-generic-app-chart

  - it: references an overridden ServiceAccount name from the pod spec
    template: deployment.yaml
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: custom-sa

  - it: maps declared service ports onto the container's ports
    template: deployment.yaml
    set:
      service.ports:
        - name: http
          port: 80
          targetPort: 8080
          protocol: TCP
        - name: metrics
          port: 9090
          targetPort: 9090
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080
      - equal:
          path: spec.template.spec.containers[0].ports[0].protocol
          value: TCP
      - equal:
          path: spec.template.spec.containers[0].ports[1].containerPort
          value: 9090

  - it: adds a config checksum annotation to the pod template when config is set
    template: deployment.yaml
    set:
      config:
        LOG_LEVEL: debug
    asserts:
      - matchRegex:
          path: spec.template.metadata.annotations["checksum/config"]
          pattern: "^[0-9a-f]{64}$"

  - it: omits the config checksum annotation when no config is set
    template: deployment.yaml
    asserts:
      - notExists:
          path: spec.template.metadata.annotations

  # Golden-value pair: independently rendered once via `helm template
  # myrelease . --set config.LOG_LEVEL=<value> -s templates/deployment.yaml`
  # and pinned here. Proves the checksum is sensitive to config content (i.e.
  # editing config actually changes the annotation and so triggers a
  # rollout), not just that it exists.
  - it: pins the checksum for a known config payload (golden value)
    template: deployment.yaml
    release:
      name: myrelease
    set:
      config:
        LOG_LEVEL: debug
    asserts:
      - equal:
          path: spec.template.metadata.annotations["checksum/config"]
          value: 5dca1b4971fcf24f18b601f3ea7006249acb16174bd63afaf610e21e07b4bccf

  - it: omits nodeSelector when unset
    template: deployment.yaml
    asserts:
      - notExists:
          path: spec.template.spec.nodeSelector

  - it: renders nodeSelector verbatim when set
    template: deployment.yaml
    set:
      nodeSelector:
        disktype: ssd
        kubernetes.io/arch: amd64
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            disktype: ssd
            kubernetes.io/arch: amd64

  - it: omits tolerations when unset
    template: deployment.yaml
    asserts:
      - notExists:
          path: spec.template.spec.tolerations

  - it: renders tolerations verbatim when set
    template: deployment.yaml
    set:
      tolerations:
        - key: dedicated
          operator: Equal
          value: gpu
          effect: NoSchedule
    asserts:
      - equal:
          path: spec.template.spec.tolerations
          value:
            - key: dedicated
              operator: Equal
              value: gpu
              effect: NoSchedule

  - it: omits priorityClassName when unset
    template: deployment.yaml
    asserts:
      - notExists:
          path: spec.template.spec.priorityClassName

  - it: renders priorityClassName when set
    template: deployment.yaml
    set:
      priorityClassName: high-priority
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: high-priority

  - it: omits topologySpreadConstraints when unset
    template: deployment.yaml
    asserts:
      - notExists:
          path: spec.template.spec.topologySpreadConstraints

  - it: renders topologySpreadConstraints verbatim when set
    template: deployment.yaml
    set:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: generic-app-chart
    asserts:
      - equal:
          path: spec.template.spec.topologySpreadConstraints
          value:
            - maxSkew: 1
              topologyKey: topology.kubernetes.io/zone
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: generic-app-chart

  - it: omits affinity when unset and replicaCount is 1
    template: deployment.yaml
    asserts:
      - notExists:
          path: spec.template.spec.affinity

  - it: renders a custom affinity verbatim when set, even with replicaCount > 1
    template: deployment.yaml
    set:
      replicaCount: 3
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values: ["amd64"]
    asserts:
      - equal:
          path: spec.template.spec.affinity
          value:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/arch
                        operator: In
                        values: ["amd64"]

  - it: injects a default preferred pod anti-affinity across hostname when replicaCount > 1 and no affinity is set
    template: deployment.yaml
    release:
      name: my-app
    set:
      replicaCount: 3
    asserts:
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].weight
          value: 100
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].podAffinityTerm.topologyKey
          value: kubernetes.io/hostname
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].podAffinityTerm.labelSelector.matchLabels["app.kubernetes.io/name"]
          value: generic-app-chart
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].podAffinityTerm.labelSelector.matchLabels["app.kubernetes.io/instance"]
          value: my-app
      - notExists:
          path: spec.template.spec.affinity.podAntiAffinity.requiredDuringSchedulingIgnoredDuringExecution

  - it: does not inject the default anti-affinity when a custom affinity is supplied, even with replicaCount > 1
    template: deployment.yaml
    set:
      replicaCount: 3
      affinity:
        nodeAffinity: {}
    asserts:
      - notExists:
          path: spec.template.spec.affinity.podAntiAffinity

  - it: does not inject a default anti-affinity when replicaCount <= 1
    template: deployment.yaml
    set:
      replicaCount: 1
    asserts:
      - notExists:
          path: spec.template.spec.affinity

  - it: injects the default anti-affinity from autoscaling's minReplicas floor even when replicaCount is left at its default of 1
    template: deployment.yaml
    release:
      name: my-app
    set:
      autoscaling:
        enabled: true
        minReplicas: 5
    asserts:
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].weight
          value: 100
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].podAffinityTerm.topologyKey
          value: kubernetes.io/hostname

  - it: does not inject a default anti-affinity when autoscaling's minReplicas is 1, even though autoscaling is enabled
    template: deployment.yaml
    set:
      autoscaling:
        enabled: true
        minReplicas: 1
    asserts:
      - notExists:
          path: spec.template.spec.affinity

  - it: changes the checksum when config content changes
    template: deployment.yaml
    release:
      name: myrelease
    set:
      config:
        LOG_LEVEL: verbose
    asserts:
      - equal:
          path: spec.template.metadata.annotations["checksum/config"]
          value: d5eb15b7a1e03c3244d587e0e1662dab7e72e024d9027f0916be87353ee66714
      - notEqual:
          path: spec.template.metadata.annotations["checksum/config"]
          value: 5dca1b4971fcf24f18b601f3ea7006249acb16174bd63afaf610e21e07b4bccf

  # Generic metadata passthrough.
  - it: adds commonAnnotations to the Deployment's own metadata
    template: deployment.yaml
    set:
      commonAnnotations:
        team: platform
    asserts:
      - equal:
          path: metadata.annotations["team"]
          value: platform

  - it: adds podLabels to the pod template merged with chart-managed pod labels, dropping none
    template: deployment.yaml
    release:
      name: my-app
    set:
      podLabels:
        tier: backend
    asserts:
      - equal:
          path: spec.template.metadata.labels["tier"]
          value: backend
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/name"]
          value: generic-app-chart
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/instance"]
          value: my-app

  # Property test: podLabels must never clobber the chart-managed pod
  # labels that the Deployment's own selector depends on.
  - it: never lets podLabels override chart-managed pod label keys
    template: deployment.yaml
    release:
      name: my-app
    set:
      podLabels:
        app.kubernetes.io/name: hijacked
        app.kubernetes.io/instance: hijacked
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/name"]
          value: generic-app-chart
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/instance"]
          value: my-app

  # Regression: podLabels is the more specific source and must win over
  # commonLabels for the same non-reserved key on the pod template — the
  # opposite precedence would silently discard a user's pod-specific override.
  - it: lets podLabels win over commonLabels for the same key on the pod template
    template: deployment.yaml
    release:
      name: my-app
    set:
      commonLabels:
        team: from-common
      podLabels:
        team: from-pod
    asserts:
      - equal:
          path: spec.template.metadata.labels["team"]
          value: from-pod

  - it: still lets commonLabels reach the pod template when podLabels does not set that key
    template: deployment.yaml
    release:
      name: my-app
    set:
      commonLabels:
        team: from-common
    asserts:
      - equal:
          path: spec.template.metadata.labels["team"]
          value: from-common

  - it: adds podAnnotations to the pod template without dropping the checksum/config annotation
    template: deployment.yaml
    set:
      config:
        LOG_LEVEL: debug
      podAnnotations:
        vault.hashicorp.com/agent-inject: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["vault.hashicorp.com/agent-inject"]
          value: "true"
      - matchRegex:
          path: spec.template.metadata.annotations["checksum/config"]
          pattern: "^[0-9a-f]{64}$"

  - it: renders podAnnotations on the pod template even when no config is set
    template: deployment.yaml
    set:
      podAnnotations:
        vault.hashicorp.com/agent-inject: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["vault.hashicorp.com/agent-inject"]
          value: "true"
      - notExists:
          path: spec.template.metadata.annotations["checksum/config"]

  # Property test: podAnnotations/commonAnnotations must never be able to
  # override the checksum/config annotation that drives the config-rollout
  # trigger — a clobbered checksum would silently stop pods from
  # restarting on config changes.
  - it: never lets podAnnotations override the checksum/config annotation
    template: deployment.yaml
    set:
      config:
        LOG_LEVEL: debug
      podAnnotations:
        checksum/config: hijacked
    asserts:
      - matchRegex:
          path: spec.template.metadata.annotations["checksum/config"]
          pattern: "^[0-9a-f]{64}$"

  - it: never lets commonAnnotations override the checksum/config annotation
    template: deployment.yaml
    set:
      config:
        LOG_LEVEL: debug
      commonAnnotations:
        checksum/config: hijacked
    asserts:
      - matchRegex:
          path: spec.template.metadata.annotations["checksum/config"]
          pattern: "^[0-9a-f]{64}$"

  - it: merges commonAnnotations into the pod template alongside podAnnotations
    template: deployment.yaml
    set:
      commonAnnotations:
        team: platform
      podAnnotations:
        vault.hashicorp.com/agent-inject: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["team"]
          value: platform
      - equal:
          path: spec.template.metadata.annotations["vault.hashicorp.com/agent-inject"]
          value: "true"

  # Observability surface: Prometheus scrape annotations, rendered via
  # the podAnnotations mechanism.
  - it: omits Prometheus scrape annotations when metrics.scrape is disabled by default
    template: deployment.yaml
    asserts:
      - notExists:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]

  - it: renders prometheus.io/scrape|port|path pod annotations when metrics.scrape is enabled
    template: deployment.yaml
    set:
      metrics:
        scrape:
          enabled: true
          port: 9797
          path: /custom-metrics
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/port"]
          value: "9797"
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/path"]
          value: /custom-metrics

  - it: merges scrape annotations with existing podAnnotations/commonAnnotations without dropping either
    template: deployment.yaml
    set:
      metrics:
        scrape:
          enabled: true
      commonAnnotations:
        team: platform
      podAnnotations:
        vault.hashicorp.com/agent-inject: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
      - equal:
          path: spec.template.metadata.annotations["team"]
          value: platform
      - equal:
          path: spec.template.metadata.annotations["vault.hashicorp.com/agent-inject"]
          value: "true"

  # Property test: the metrics block must never panic the render when a
  # caller explicitly nulls it out or an intermediate key (the
  # "nulled-intermediate-key" bug class) — the chart must fall back to its
  # off-by-default behavior instead of crashing.
  - it: never panics and stays off by default when metrics is explicitly nulled (robustness)
    template: deployment.yaml
    set:
      metrics: null
    asserts:
      - notExists:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]

  - it: never panics and stays off by default when metrics.scrape is explicitly nulled (robustness)
    template: deployment.yaml
    set:
      metrics:
        scrape: null
    asserts:
      - notExists:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
  - it: renders imagePullSecrets on the pod spec when set
    template: deployment.yaml
    set:
      imagePullSecrets:
        - name: existing-registry-secret
        - name: another-registry-secret
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets
          value:
            - name: existing-registry-secret
            - name: another-registry-secret

  - it: omits imagePullSecrets from the pod spec when unset
    template: deployment.yaml
    asserts:
      - notExists:
          path: spec.template.spec.imagePullSecrets

  - it: renders extraVolumes/extraVolumeMounts on the pod and container, coexisting with the auto /tmp mount
    template: deployment.yaml
    set:
      extraVolumes:
        - name: tls-certs
          secret:
            secretName: existing-tls-secret
      extraVolumeMounts:
        - name: tls-certs
          mountPath: /etc/tls
          readOnly: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tls-certs
            secret:
              secretName: existing-tls-secret
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tls-certs
            mountPath: /etc/tls
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tmp
            emptyDir: {}
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tmp
            mountPath: /tmp

  - it: coexists with extraEmptyDirs and the persistence PVC when all are set together
    template: deployment.yaml
    release:
      name: my-app
    set:
      extraEmptyDirs:
        - name: cache
          mountPath: /var/cache/app
      persistence:
        enabled: true
        mountPath: /data
      extraVolumes:
        - name: tls-certs
          secret:
            secretName: existing-tls-secret
      extraVolumeMounts:
        - name: tls-certs
          mountPath: /etc/tls
          readOnly: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tmp
            emptyDir: {}
      - contains:
          path: spec.template.spec.volumes
          content:
            name: cache
            emptyDir: {}
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            persistentVolumeClaim:
              claimName: my-app-generic-app-chart
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tls-certs
            secret:
              secretName: existing-tls-secret
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tmp
            mountPath: /tmp
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: cache
            mountPath: /var/cache/app
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tls-certs
            mountPath: /etc/tls
            readOnly: true
  - it: defaults terminationGracePeriodSeconds to 30 on the pod spec
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 30

  - it: renders an overridden terminationGracePeriodSeconds on the pod spec
    template: deployment.yaml
    set:
      terminationGracePeriodSeconds: 90
    asserts:
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 90

  - it: omits the lifecycle block when no preStop is configured
    template: deployment.yaml
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].lifecycle

  - it: renders a preStop sleep-drain shorthand as a container lifecycle exec sleep
    template: deployment.yaml
    set:
      preStop:
        sleepSeconds: 5
    asserts:
      - equal:
          path: spec.template.spec.containers[0].lifecycle.preStop.exec.command
          value: ["/bin/sh", "-c", "sleep 5"]

  - it: renders the sleep-0 exec command when preStop.sleepSeconds is explicitly 0, not an absent lifecycle block
    template: deployment.yaml
    set:
      preStop:
        sleepSeconds: 0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].lifecycle.preStop.exec.command
          value: ["/bin/sh", "-c", "sleep 0"]

  # Property test: preStop is an optional map (like the metrics block) and
  # must never panic the render when a caller explicitly nulls it out — the
  # chart must fall back to its off-by-default behavior (no lifecycle block)
  # instead of crashing on `hasKey` against a nil value.
  - it: never panics and omits the lifecycle block when preStop is explicitly nulled (robustness)
    template: deployment.yaml
    set:
      preStop: null
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].lifecycle

  - it: renders a raw lifecycle block verbatim, taking precedence over the sleep shorthand
    template: deployment.yaml
    set:
      preStop:
        sleepSeconds: 5
      lifecycle:
        preStop:
          exec:
            command: ["/bin/sh", "-c", "sleep 15 && custom-cleanup.sh"]
        postStart:
          exec:
            command: ["/bin/sh", "-c", "echo starting"]
    asserts:
      - equal:
          path: spec.template.spec.containers[0].lifecycle.preStop.exec.command
          value: ["/bin/sh", "-c", "sleep 15 && custom-cleanup.sh"]
      - equal:
          path: spec.template.spec.containers[0].lifecycle.postStart.exec.command
          value: ["/bin/sh", "-c", "echo starting"]

  - it: omits revisionHistoryLimit and minReadySeconds when unset
    template: deployment.yaml
    asserts:
      - notExists:
          path: spec.revisionHistoryLimit
      - notExists:
          path: spec.minReadySeconds

  - it: renders revisionHistoryLimit and minReadySeconds when set
    template: deployment.yaml
    set:
      revisionHistoryLimit: 3
      minReadySeconds: 10
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 3
      - equal:
          path: spec.minReadySeconds
          value: 10

  # Regression: an explicit 0 is a meaningful, distinct-from-default value
  # (immediate ReplicaSet cleanup / no minimum ready wait) and must not be
  # dropped by falsy-zero truthiness checks — see the maxSurge/maxUnavailable
  # zero-value test below for the sibling case this mirrors.
  - it: renders revisionHistoryLimit and minReadySeconds when explicitly set to 0
    template: deployment.yaml
    set:
      revisionHistoryLimit: 0
      minReadySeconds: 0
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 0
      - equal:
          path: spec.minReadySeconds
          value: 0

  - it: renders a configurable RollingUpdate strategy with maxSurge and maxUnavailable when persistence is disabled
    template: deployment.yaml
    set:
      updateStrategy:
        maxSurge: 1
        maxUnavailable: 0
    asserts:
      - equal:
          path: spec.strategy.type
          value: RollingUpdate
      - equal:
          path: spec.strategy.rollingUpdate.maxSurge
          value: 1
      - equal:
          path: spec.strategy.rollingUpdate.maxUnavailable
          value: 0

  - it: renders only the configured half of the RollingUpdate strategy when just maxSurge is set
    template: deployment.yaml
    set:
      updateStrategy:
        maxSurge: "25%"
    asserts:
      - equal:
          path: spec.strategy.rollingUpdate.maxSurge
          value: "25%"
      - notExists:
          path: spec.strategy.rollingUpdate.maxUnavailable

  # Property/invariant: the "is this set" guard (generic-app-chart.isSet,
  # _values.tpl) must resolve the same way for every point in this field's
  # 3-state input space — unset, explicit 0, explicit null — because a
  # string-based guard has already gotten two of these three states wrong
  # across two separate fixes:
  #   1. `{{- with .Values.X }}` (truthiness) dropped explicit 0 (falsy).
  #   2. `toString .Values.X != ""` fixed 0 but then treated explicit null as
  #      "set", because Sprig's toString(nil) is the literal string "<nil>"
  #      (non-empty) — rendering a dangling `key: ` with no value.
  # These three cases together pin that invariant for revisionHistoryLimit;
  # "omits revisionHistoryLimit and minReadySeconds when unset" above
  # covers state 1, "...explicitly set to 0" above covers state 2, and
  # this test covers state 3.
  - it: omits revisionHistoryLimit and minReadySeconds when explicitly set to null
    template: deployment.yaml
    set:
      revisionHistoryLimit: null
      minReadySeconds: null
    asserts:
      - notExists:
          path: spec.revisionHistoryLimit
      - notExists:
          path: spec.minReadySeconds

  # Same invariant, confirmed identical across the other 3 fields sharing the
  # generic-app-chart.isSet guard: a single explicit-null override for all 4
  # fields must omit all 4 keys, not just revisionHistoryLimit/
  # minReadySeconds. maxSurge/maxUnavailable's unset (see "renders only the
  # configured half..." above) and explicit-0 (see "renders a configurable
  # RollingUpdate strategy..." above) states were already covered; this adds
  # their third state, closing the same 3-state grid for the sibling fields.
  - it: omits maxSurge and maxUnavailable from the RollingUpdate strategy when explicitly set to null
    template: deployment.yaml
    set:
      updateStrategy:
        maxSurge: null
        maxUnavailable: null
    asserts:
      - notExists:
          path: spec.strategy.rollingUpdate.maxSurge
      - notExists:
          path: spec.strategy.rollingUpdate.maxUnavailable

  # Regression: nulling the PARENT key (not just a leaf) must not crash the
  # whole render. `.Values.updateStrategy.maxSurge` dereferences through
  # `.Values.updateStrategy`, and Helm's merge drops the `updateStrategy` key
  # entirely when a caller sets it to `null` (same "kindIs invalid" signal as
  # any other unset key) — so a direct `.Values.updateStrategy.maxSurge`
  # access panics evaluating a field on a nil value before isSet ever runs on
  # the result. `dig` must short-circuit through the nil parent instead of
  # dereferencing it.
  - it: omits the RollingUpdate strategy and does not crash when the updateStrategy parent itself is set to null
    template: deployment.yaml
    set:
      updateStrategy: null
    asserts:
      - notExists:
          path: spec.strategy.rollingUpdate
      - notExists:
          path: spec.strategy.rollingUpdate.maxSurge
      - notExists:
          path: spec.strategy.rollingUpdate.maxUnavailable
