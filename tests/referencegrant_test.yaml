# M5 networking — ReferenceGrant (referencegrant.yaml) — R23, R24 (ADR 0001).
# R23 property test: the ReferenceGrant must render if and only if routing AND
# TLS are both enabled AND the Gateway's namespace differs from the release
# namespace — it exists solely to authorize the Gateway's cross-namespace
# certificateRefs read of this app's TLS Secret (ADR 0001: app-owned
# HTTPRoute/Certificate means the Service backendRef is same-namespace and
# never needs a grant). Table covers the adversarial namespace/TLS
# combinations in one suite so a fix to one case can't silently regress
# another.
suite: generic-app-chart ReferenceGrant (M5)
templates:
  - referencegrant.yaml
tests:
  - it: renders no ReferenceGrant when routing is disabled (R24)
    asserts:
      - hasDocuments:
          count: 0

  - it: renders no ReferenceGrant when the Gateway namespace equals the release namespace (R23)
    release:
      namespace: my-app-ns
    set:
      routing:
        enabled: true
        hostnames: ["my-app.dackota.dev"]
        gateway:
          namespace: my-app-ns
    asserts:
      - hasDocuments:
          count: 0

  - it: renders no ReferenceGrant when the Gateway namespace is unset, defaulting to the release namespace (R23)
    release:
      namespace: my-app-ns
    set:
      routing:
        enabled: true
        hostnames: ["my-app.dackota.dev"]
    asserts:
      - hasDocuments:
          count: 0

  - it: renders no ReferenceGrant when namespaces differ but TLS is disabled — no Secret exists to grant, and the Service never needs one (R23, ADR 0001)
    release:
      name: my-app
      namespace: my-app-ns
    set:
      routing:
        enabled: true
        hostnames: ["my-app.dackota.dev"]
        gateway:
          namespace: traefik
        tls:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a ReferenceGrant scoped by name to only this app's TLS Secret when namespaces differ and TLS is enabled (R23, ADR 0001)
    release:
      name: my-app
      namespace: my-app-ns
    set:
      routing:
        enabled: true
        hostnames: ["my-app.dackota.dev"]
        gateway:
          namespace: traefik
    asserts:
      - isKind:
          of: ReferenceGrant
      - isAPIVersion:
          of: gateway.networking.k8s.io/v1beta1
      - equal:
          path: metadata.namespace
          value: my-app-ns
      - equal:
          path: spec.from
          value:
            - group: gateway.networking.k8s.io
              kind: Gateway
              namespace: traefik
      - equal:
          path: spec.to
          value:
            - group: ""
              kind: Secret
              name: my-app-generic-app-chart-tls
      - notContains:
          path: spec.to
          content:
            group: ""
            kind: Service
            name: my-app-generic-app-chart
