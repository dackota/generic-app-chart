# Property test: generic-app-chart is referenced-secret-only (see CONTEXT.md
# "referenced Secret") — it must NEVER render a Secret resource carrying
# `data`/`stringData`. This is a property of the whole rendered manifest set,
# not one template, so it targets every template file and re-asserts across
# several adversarial values permutations (including someone smuggling a
# secret-shaped literal into env/config, which the chart must still refuse to
# turn into a Secret resource).
suite: generic-app-chart never renders a Secret resource
templates:
  - "*"
tests:
  - it: renders zero Secret documents with default values
    documentSelector:
      path: kind
      value: Secret
      matchMany: true
      skipEmptyTemplates: true
    asserts:
      - hasDocuments:
          count: 0
          filterAware: true

  - it: renders zero Secret documents when persistence is enabled
    set:
      persistence.enabled: true
    documentSelector:
      path: kind
      value: Secret
      matchMany: true
      skipEmptyTemplates: true
    asserts:
      - hasDocuments:
          count: 0
          filterAware: true

  - it: renders zero Secret documents when a literal secret-shaped value is smuggled into config data
    set:
      config:
        password: "hunter2"
        api-key: "sk-live-adversarial-literal"
    documentSelector:
      path: kind
      value: Secret
      matchMany: true
      skipEmptyTemplates: true
    asserts:
      - hasDocuments:
          count: 0
          filterAware: true

  - it: renders zero Secret documents when a literal secret-shaped value is smuggled into a plain env entry
    set:
      env:
        - name: DATABASE_PASSWORD
          value: "hunter2-adversarial"
    documentSelector:
      path: kind
      value: Secret
      matchMany: true
      skipEmptyTemplates: true
    asserts:
      - hasDocuments:
          count: 0
          filterAware: true

  # The referenced-only invariant must keep holding across the routing/TLS,
  # autoscaling, and NetworkPolicy surface too, not just the modules that
  # existed when this suite was first written.
  - it: renders zero Secret documents from the autoscaling scenario
    values:
      - ./values/autoscaling.yaml
    documentSelector:
      path: kind
      value: Secret
      matchMany: true
      skipEmptyTemplates: true
    asserts:
      - hasDocuments:
          count: 0
          filterAware: true

  - it: renders zero Secret documents from the networkpolicy scenario
    values:
      - ./values/networkpolicy.yaml
    documentSelector:
      path: kind
      value: Secret
      matchMany: true
      skipEmptyTemplates: true
    asserts:
      - hasDocuments:
          count: 0
          filterAware: true

  - it: renders zero Secret documents from the cluster-only scenario
    values:
      - ./values/cluster-only.yaml
    documentSelector:
      path: kind
      value: Secret
      matchMany: true
      skipEmptyTemplates: true
    asserts:
      - hasDocuments:
          count: 0
          filterAware: true

  - it: renders zero Secret documents from the full scenario, even though it issues a Certificate with a secretName
    values:
      - ./values/full.yaml
    documentSelector:
      path: kind
      value: Secret
      matchMany: true
      skipEmptyTemplates: true
    asserts:
      - hasDocuments:
          count: 0
          filterAware: true
