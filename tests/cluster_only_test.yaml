# Networking — cluster-only mode. Property test: with routing disabled,
# none of the three routing/TLS resources render, while the Service — the
# thing cluster-only mode still needs — keeps rendering. One test spanning all
# four templates, rather than one ad hoc "renders no X" case per resource
# kind, so the whole cluster-only contract is pinned in a single place.
suite: generic-app-chart cluster-only mode
templates:
  - httproute.yaml
  - certificate.yaml
  - referencegrant.yaml
  - service.yaml
tests:
  - it: renders no HTTPRoute, Certificate, or ReferenceGrant while the Service keeps rendering
    asserts:
      - hasDocuments:
          count: 0
        template: httproute.yaml
      - hasDocuments:
          count: 0
        template: certificate.yaml
      - hasDocuments:
          count: 0
        template: referencegrant.yaml
      - isKind:
          of: Service
        template: service.yaml
