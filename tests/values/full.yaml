# R31 scenario: the "everything on" case — routing + TLS through a
# cross-namespace Gateway (exercising the ReferenceGrant), autoscaling, a PDB,
# NetworkPolicy, and config, all together. Persistence stays disabled since it
# is mutually exclusive with autoscaling (R20/R25) — that combination is
# covered by persistent.yaml instead.
image:
  repository: ghcr.io/dackota/change-tracking-dashboard
  tag: "1.0.0"

service:
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP

config:
  LOG_LEVEL: info

routing:
  enabled: true
  hostnames:
    - ctd.dackota.dev
  gateway:
    name: shared-gateway
    namespace: traefik
    sectionName: https
  tls:
    enabled: true
    issuerRef:
      name: letsencrypt
      kind: ClusterIssuer

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 75

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  gateway:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: traefik
