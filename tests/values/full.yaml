# R31 scenario: the "everything on" case — routing + TLS through a
# cross-namespace Gateway (exercising the ReferenceGrant), autoscaling, a PDB,
# NetworkPolicy, config, imagePullSecrets, and extraVolumes/extraVolumeMounts
# (R42/R43), all together. Persistence stays disabled since it is mutually
# exclusive with autoscaling (R20/R25) — that combination (persistence +
# extraVolumes coexisting with the PVC) is covered by the dedicated
# deployment_test.yaml coexistence test instead.
image:
  repository: ghcr.io/dackota/change-tracking-dashboard
  tag: "1.0.0"

imagePullSecrets:
  - name: existing-registry-secret

extraVolumes:
  - name: tls-certs
    secret:
      secretName: existing-tls-secret

extraVolumeMounts:
  - name: tls-certs
    mountPath: /etc/tls
    readOnly: true

service:
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP

config:
  LOG_LEVEL: info

routing:
  enabled: true
  hostnames:
    - ctd.dackota.dev
  gateway:
    name: shared-gateway
    namespace: traefik
    sectionName: https
  tls:
    enabled: true
    issuerRef:
      name: letsencrypt
      kind: ClusterIssuer

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 75

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  gateway:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: traefik
