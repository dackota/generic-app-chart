# R31 scenario: the "everything on" case — routing + TLS through a
# cross-namespace Gateway (exercising the ReferenceGrant), autoscaling, a PDB,
# NetworkPolicy, config, imagePullSecrets, and extraVolumes/extraVolumeMounts
# (R42/R43), all together. Persistence stays disabled since it is mutually
# exclusive with autoscaling (R20/R25) — that combination (persistence +
# extraVolumes coexisting with the PVC) is covered by the dedicated
# deployment_test.yaml coexistence test instead.
image:
  repository: ghcr.io/dackota/change-tracking-dashboard
  tag: "1.0.0"

imagePullSecrets:
  - name: existing-registry-secret

extraVolumes:
  - name: tls-certs
    secret:
      secretName: existing-tls-secret

extraVolumeMounts:
  - name: tls-certs
    mountPath: /etc/tls
    readOnly: true

service:
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP

config:
  LOG_LEVEL: info

# R40: observability surface, exercised alongside every other feature.
metrics:
  scrape:
    enabled: true
    port: 9090
    path: /metrics
  serviceMonitor:
    enabled: true
    port: metrics
    path: /metrics
    interval: 30s

routing:
  enabled: true
  hostnames:
    - ctd.dackota.dev
  gateway:
    name: shared-gateway
    namespace: traefik
    sectionName: https
  tls:
    enabled: true
    issuerRef:
      name: letsencrypt
      kind: ClusterIssuer

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 75

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  gateway:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: traefik

# R39: generic metadata passthrough, exercised alongside every other feature.
commonLabels:
  cost-center: ctd
commonAnnotations:
  owner: platform-team
podAnnotations:
  vault.hashicorp.com/agent-inject: "true"
podLabels:
  tier: web
serviceAnnotations:
  external-dns.alpha.kubernetes.io/hostname: ctd.dackota.dev
