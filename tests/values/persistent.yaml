# Scenario: persistence enabled — a stateful app (e.g. CTD) that needs an
# RWO Longhorn volume. Exercises the persistence/replica-count coupling: Recreate strategy,
# replicas pinned to 1, no autoscaling.
image:
  repository: ghcr.io/dackota/change-tracking-dashboard
  tag: "1.0.0"

service:
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP

persistence:
  enabled: true
  size: 5Gi
  storageClass: longhorn
  mountPath: /data
