# Service (service.yaml).
suite: generic-app-chart Service
templates:
  - service.yaml
tests:
  - it: renders a ClusterIP Service by default mapping declared ports
    set:
      service.ports:
        - name: http
          port: 80
          targetPort: 8080
          protocol: TCP
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].name
          value: http
      - equal:
          path: spec.ports[0].port
          value: 80
      - equal:
          path: spec.ports[0].targetPort
          value: 8080
      - equal:
          path: spec.ports[0].protocol
          value: TCP

  - it: allows overriding the Service type
    set:
      service.type: LoadBalancer
      service.ports:
        - name: http
          port: 80
          targetPort: 8080
    asserts:
      - equal:
          path: spec.type
          value: LoadBalancer

  - it: selects pods via the chart's stable selector labels
    release:
      name: my-app
    set:
      service.ports:
        - name: http
          port: 80
          targetPort: 8080
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: generic-app-chart
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: my-app

  # Generic metadata passthrough.
  - it: adds serviceAnnotations to the Service
    set:
      serviceAnnotations:
        external-dns.alpha.kubernetes.io/hostname: my-app.dackota.dev
    asserts:
      - equal:
          path: metadata.annotations["external-dns.alpha.kubernetes.io/hostname"]
          value: my-app.dackota.dev

  - it: merges commonAnnotations into the Service alongside serviceAnnotations, serviceAnnotations winning on conflict
    set:
      commonAnnotations:
        team: platform
        external-dns.alpha.kubernetes.io/hostname: common-value
      serviceAnnotations:
        external-dns.alpha.kubernetes.io/hostname: service-specific-value
    asserts:
      - equal:
          path: metadata.annotations["team"]
          value: platform
      - equal:
          path: metadata.annotations["external-dns.alpha.kubernetes.io/hostname"]
          value: service-specific-value

  - it: adds commonLabels to the Service
    set:
      commonLabels:
        team: platform
    asserts:
      - equal:
          path: metadata.labels["team"]
          value: platform
