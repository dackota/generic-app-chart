# Config (configmap.yaml).
suite: generic-app-chart ConfigMap
templates:
  - configmap.yaml
tests:
  - it: renders a ConfigMap from values config data
    set:
      config:
        LOG_LEVEL: debug
        FEATURE_X: "true"
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: data.LOG_LEVEL
          value: debug
      - equal:
          path: data.FEATURE_X
          value: "true"

  - it: renders no ConfigMap when no config data is set
    asserts:
      - hasDocuments:
          count: 0

  # Generic metadata passthrough.
  - it: adds commonLabels and commonAnnotations to the ConfigMap
    set:
      config:
        LOG_LEVEL: debug
      commonLabels:
        team: platform
      commonAnnotations:
        owner: platform-team
    asserts:
      - equal:
          path: metadata.labels["team"]
          value: platform
      - equal:
          path: metadata.annotations["owner"]
          value: platform-team
