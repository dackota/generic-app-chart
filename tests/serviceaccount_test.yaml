# M7 serviceaccount (serviceaccount.yaml) — R14.
suite: generic-app-chart ServiceAccount (M7)
templates:
  - serviceaccount.yaml
tests:
  - it: creates a dedicated ServiceAccount named after the release by default
    release:
      name: my-app
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: my-app-generic-app-chart

  - it: honors an explicit serviceAccount.name override
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: does not create a ServiceAccount when reusing an existing one
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  # R39 generic metadata passthrough.
  - it: adds commonLabels and commonAnnotations to the ServiceAccount (R39)
    set:
      commonLabels:
        team: platform
      commonAnnotations:
        owner: platform-team
    asserts:
      - equal:
          path: metadata.labels["team"]
          value: platform
      - equal:
          path: metadata.annotations["owner"]
          value: platform-team

  - it: merges commonAnnotations with serviceAccount.annotations, the more specific one winning on conflict (R39)
    set:
      commonAnnotations:
        team: platform
        eks.amazonaws.com/role-arn: common-role
      serviceAccount:
        annotations:
          eks.amazonaws.com/role-arn: specific-role
    asserts:
      - equal:
          path: metadata.annotations["team"]
          value: platform
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: specific-role
