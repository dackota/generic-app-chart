# Default values for generic-app-chart.
# This is a YAML-formatted file — see README.md for the full reference.

# R2: derived names default to "<release>-<chart>" (or just "<release>" when
# the release name already contains the chart name). Override either to
# control the name every resource in this chart is rendered under.
nameOverride: ""
fullnameOverride: ""

image:
  repository: ""
  # Defaults to .Chart.AppVersion when unset.
  tag: ""
  pullPolicy: IfNotPresent

# R42: references existing (referenced) image-pull Secret(s) by name for
# private-registry pulls — this chart never creates the Secret being
# referenced here. Omitted from the pod spec entirely when empty.
#   imagePullSecrets:
#     - name: existing-registry-secret
imagePullSecrets: []

# R3: omitted from the container spec when unset.
command: []
args: []

# R4/R6: plain and valueFrom-sourced entries — this is the native Kubernetes
# EnvVar shape, so both forms live in one list:
#   env:
#     - name: LOG_LEVEL
#       value: debug
#     - name: DB_PASSWORD
#       valueFrom:
#         secretKeyRef:
#           name: existing-db-secret   # a referenced Secret — never created by this chart
#           key: password
env: []

# R5: references an existing Secret/ConfigMap by name — this chart never
# creates the Secret/ConfigMap being referenced here.
#   envFrom:
#     - secretRef:
#         name: existing-app-secret
#     - configMapRef:
#         name: existing-app-config
envFrom: []

# R7: only rendered when set; supports httpGet/tcpSocket/exec forms exactly as
# the Kubernetes Probe spec does.
livenessProbe: {}
readinessProbe: {}
startupProbe: {}

# Ignored (forced to 1) when persistence.enabled — see R19 in deployment.yaml.
replicaCount: 1

# R13: no pod automatically mounts its ServiceAccount token unless opted in.
automountServiceAccountToken: false

# R9: pod-level strict security defaults (_security.tpl). Every field below
# is independently overridable (R12) — set only the field you need to change,
# the rest keep their restricted-PSA-compliant default.
podSecurityContext: {}
# podSecurityContext:
#   runAsUser: 1000        # override just this field; runAsGroup/fsGroup/etc. stay at their defaults

# R10: container-level strict security defaults (_security.tpl), merged the
# same way as podSecurityContext.
containerSecurityContext: {}
# containerSecurityContext:
#   readOnlyRootFilesystem: false   # e.g. for an app that writes outside /tmp

# R11: additional writable emptyDir mounts beyond the automatic /tmp one that
# readOnlyRootFilesystem provisions.
#   extraEmptyDirs:
#     - name: cache
#       mountPath: /var/cache/app
#       sizeLimit: 256Mi   # optional
extraEmptyDirs: []

# R43: arbitrary additional volumes/volumeMounts beyond the automatic /tmp,
# extraEmptyDirs, and persistence PVC — e.g. mounting a referenced Secret or
# ConfigMap. Native Kubernetes Volume/VolumeMount shapes, assembled through
# the same _volumes.tpl partial as the sources above so they all coexist; the
# `name` in each extraVolumes entry must match the corresponding
# extraVolumeMounts entry.
#   extraVolumes:
#     - name: tls-certs
#       secret:
#         secretName: existing-tls-secret   # a referenced Secret — never created by this chart
#   extraVolumeMounts:
#     - name: tls-certs
#       mountPath: /etc/tls
#       readOnly: true
extraVolumes: []
extraVolumeMounts: []

# R8: requests AND limits are always set; override wholesale for a hungrier app.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# R39: generic metadata passthrough. podAnnotations/podLabels apply to the pod
# template only; commonLabels/commonAnnotations apply to every resource this
# chart renders. All four are merged with (and always overridden by) this
# chart's managed labels/annotations — selector labels and the checksum/config
# annotation (R17) can never be clobbered by a user-supplied key.
podAnnotations: {}
podLabels: {}
commonLabels: {}
commonAnnotations: {}

# R14: a dedicated ServiceAccount per app; set create: false and name to reuse
# an existing one instead.
serviceAccount:
  create: true
  name: ""
  annotations: {}

# R15: maps declared ports to the pod's container ports (see deployment.yaml,
# which renders container ports from this same list).
service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP

# R39: additional annotations for the Service only, merged with
# commonAnnotations (serviceAnnotations wins on conflict, being the more
# specific of the two).
serviceAnnotations: {}

# R16: rendered into a ConfigMap when non-empty; omitted entirely otherwise.
config: {}

# R18/R19/R20: an RWO Longhorn PVC. Enabling it forces the Deployment to
# `strategy: Recreate` + `replicas: 1` (see deployment.yaml) since a Longhorn
# RWO volume cannot be multi-attached during a rollout, and it must never be
# paired with autoscaling (see the networking-operational-addons task, which
# adds hpa.yaml — that template must gate on persistence.enabled the same way
# this chart's replica logic does).
persistence:
  enabled: false
  size: 1Gi
  storageClass: longhorn
  mountPath: /data
  existingClaim: ""

# R21/R22/R23: cluster-only by default (routing.enabled: false) — no
# HTTPRoute/Certificate/ReferenceGrant renders until routing is turned on (see
# R24). When enabled, the chart exposes this app's Service through the lab's
# one shared Traefik Gateway and issues it a letsencrypt certificate.
routing:
  enabled: false
  # Hostname(s) the HTTPRoute matches and the Certificate's dnsNames are
  # derived from.
  hostnames: []
  # R21: parentRef to the shared Gateway — name/namespace/sectionName are all
  # overridable per app; there is exactly one Gateway on this lab.
  gateway:
    name: shared-gateway
    # Defaults to this release's namespace when unset (R23 default case).
    namespace: ""
    # Optional; omitted from the parentRef when unset (matches any listener).
    sectionName: ""
  # R22: TLS is on by default whenever routing is enabled — opt out per app if
  # a route genuinely needs to stay HTTP-only.
  tls:
    enabled: true
    issuerRef:
      name: letsencrypt
      kind: ClusterIssuer
    # Defaults to "<fullname>-tls" when unset.
    secretName: ""

# R25: opt-in HPA. Mutually exclusive with persistence.enabled — a Longhorn
# RWO volume can only be attached to one pod, so the chart suppresses the HPA
# (and keeps the Deployment's static replicas) whenever persistence is on,
# regardless of this flag (see deployment.yaml/hpa.yaml).
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # Omitted from the HPA's metrics when unset.
  targetMemoryUtilizationPercentage: ""

# R26: opt-in PDB. minAvailable/maxUnavailable are mutually exclusive; set
# maxUnavailable to use it instead of the default minAvailable.
pdb:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

# R40: opt-in observability surface, off by default. Scrape annotations
# render on the pod template via the R39 podAnnotations mechanism
# (_metadata.tpl); the ServiceMonitor (monitoring.coreos.com/v1,
# templates/servicemonitor.yaml) requires the prometheus-operator CRDs to
# already be installed cluster-side.
metrics:
  scrape:
    enabled: false
    # Port Prometheus scrapes /metrics from — usually a container port
    # already declared under service.ports.
    port: 9090
    path: /metrics
  serviceMonitor:
    enabled: false
    # Must match a port name already declared under service.ports; the
    # ServiceMonitor selects this app's Service by that named port.
    port: metrics
    path: /metrics
    # Omitted from the ServiceMonitor endpoint when unset (falls back to the
    # Prometheus Operator's own global scrape interval).
    interval: ""

# R27: opt-in default-deny-ingress NetworkPolicy. When enabled, only the
# configured gateway namespace/pods may reach this app; everything else is
# denied by default. Egress stays unrestricted unless additionalEgress rules
# are supplied.
networkPolicy:
  enabled: false
  gateway:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: traefik
    # Optional; narrows the allow rule to specific pods within the gateway
    # namespace when set.
    podSelector: {}
  # Native NetworkPolicyEgressRule entries, e.g. to allow DNS or an external API:
  #   additionalEgress:
  #     - to:
  #         - namespaceSelector: {}
  #       ports:
  #         - protocol: UDP
  #           port: 53
  additionalEgress: []
