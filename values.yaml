# Default values for generic-app-chart.
# This is a YAML-formatted file — see README.md for the full reference.

# Derived names default to "<release>-<chart>" (or just "<release>" when
# the release name already contains the chart name). Override either to
# control the name every resource in this chart is rendered under.
nameOverride: ""
fullnameOverride: ""

image:
  repository: ""
  # Defaults to .Chart.AppVersion when unset.
  tag: ""
  pullPolicy: IfNotPresent

# References existing (referenced) image-pull Secret(s) by name for
# private-registry pulls — this chart never creates the Secret being
# referenced here. Omitted from the pod spec entirely when empty.
#   imagePullSecrets:
#     - name: existing-registry-secret
imagePullSecrets: []

# Omitted from the container spec when unset.
command: []
args: []

# Plain and valueFrom-sourced entries — this is the native Kubernetes
# EnvVar shape, so both forms live in one list:
#   env:
#     - name: LOG_LEVEL
#       value: debug
#     - name: DB_PASSWORD
#       valueFrom:
#         secretKeyRef:
#           name: existing-db-secret   # a referenced Secret — never created by this chart
#           key: password
env: []

# References an existing Secret/ConfigMap by name — this chart never
# creates the Secret/ConfigMap being referenced here.
#   envFrom:
#     - secretRef:
#         name: existing-app-secret
#     - configMapRef:
#         name: existing-app-config
envFrom: []

# Each of livenessProbe/readinessProbe/startupProbe accepts three
# forms, tried in this order:
#   1. A raw native Probe block — supports httpGet/tcpSocket/exec/grpc
#      exactly as the Kubernetes Probe spec does — rendered verbatim,
#      overriding the shorthand/default below.
#   2. A shorthand: {path, port} for an HTTP probe, or {port} alone for a
#      TCP probe; any other native Probe field (initialDelaySeconds,
#      periodSeconds, ...) may be added alongside and passes through as-is.
#        readinessProbe:
#          path: /healthz
#          port: 8080
#          initialDelaySeconds: 5
#   3. Empty (the {} default) — omitted, except readinessProbe, which falls
#      back to a tcpSocket check on the primary service port
#      (service.ports[0].targetPort) when no readiness probe is configured.
#      livenessProbe/startupProbe never get a synthesized default — a bad
#      default liveness probe would cause restart loops, so both stay
#      strictly opt-in.
livenessProbe: {}
readinessProbe: {}
startupProbe: {}

# Ignored (forced to 1) when persistence.enabled — see the persistence handling in deployment.yaml.
replicaCount: 1

# Bounds how many old ReplicaSets Kubernetes retains for rollback;
# omitted (cluster default of 10 applies) when unset.
revisionHistoryLimit: ""

# Minimum seconds a new pod must run without crashing before it counts
# as available; omitted (defaults to 0) when unset.
minReadySeconds: ""

# Configurable RollingUpdate bounds. Ignored — the Deployment stays
# `strategy: Recreate` — whenever persistence.enabled (that setting always wins).
updateStrategy:
  maxSurge: ""
  maxUnavailable: ""

# No pod automatically mounts its ServiceAccount token unless opted in.
automountServiceAccountToken: false

# Seconds Kubernetes waits after sending SIGTERM before force-killing the
# pod; override for apps that need longer (or shorter) to drain in-flight
# work before exit.
terminationGracePeriodSeconds: 30

# Sleep-drain shorthand — set `preStop.sleepSeconds` to render a
# container lifecycle.preStop exec `sleep <n>` hook, giving in-flight
# connections time to drain before SIGTERM is sent. Ignored whenever
# `lifecycle` below is set.
preStop: {}
#   preStop:
#     sleepSeconds: 5

# Raw Lifecycle passthrough — rendered verbatim exactly as the
# Kubernetes container Lifecycle spec (preStop/postStart), taking precedence
# over preStop.sleepSeconds above. No `lifecycle` block is rendered on the
# container when neither this nor preStop.sleepSeconds is set.
#   lifecycle:
#     preStop:
#       exec:
#         command: ["/bin/sh", "-c", "sleep 5 && custom-cleanup.sh"]
lifecycle: {}

# Pod-level strict security defaults (_security.tpl). Every field below
# is independently overridable — set only the field you need to change,
# the rest keep their restricted-PSA-compliant default.
podSecurityContext: {}
# podSecurityContext:
#   runAsUser: 1000        # override just this field; runAsGroup/fsGroup/etc. stay at their defaults

# Container-level strict security defaults (_security.tpl), merged the
# same way as podSecurityContext.
containerSecurityContext: {}
# containerSecurityContext:
#   readOnlyRootFilesystem: false   # e.g. for an app that writes outside /tmp

# Additional writable emptyDir mounts beyond the automatic /tmp one that
# readOnlyRootFilesystem provisions.
#   extraEmptyDirs:
#     - name: cache
#       mountPath: /var/cache/app
#       sizeLimit: 256Mi   # optional
extraEmptyDirs: []

# Arbitrary additional volumes/volumeMounts beyond the automatic /tmp,
# extraEmptyDirs, and persistence PVC — e.g. mounting a referenced Secret or
# ConfigMap. Native Kubernetes Volume/VolumeMount shapes, assembled through
# the same _volumes.tpl partial as the sources above so they all coexist; the
# `name` in each extraVolumes entry must match the corresponding
# extraVolumeMounts entry.
#   extraVolumes:
#     - name: tls-certs
#       secret:
#         secretName: existing-tls-secret   # a referenced Secret — never created by this chart
#   extraVolumeMounts:
#     - name: tls-certs
#       mountPath: /etc/tls
#       readOnly: true
extraVolumes: []
extraVolumeMounts: []

# Requests AND limits are always set; override wholesale for a hungrier app.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Generic metadata passthrough. podAnnotations/podLabels apply to the pod
# template only; commonLabels/commonAnnotations apply to every resource this
# chart renders. All four are merged with (and always overridden by) this
# chart's managed labels/annotations — selector labels and the checksum/config
# annotation can never be clobbered by a user-supplied key.
podAnnotations: {}
podLabels: {}
commonLabels: {}
commonAnnotations: {}

# Native nodeSelector/tolerations/priorityClassName/
# topologySpreadConstraints/affinity passthrough — each omitted from the pod
# spec unless set. When affinity is left unset and replicaCount > 1, the
# chart injects a default soft (preferred) pod anti-affinity across
# kubernetes.io/hostname instead (see deployment.yaml) — set affinity
# explicitly to opt out of that default.
nodeSelector: {}
tolerations: []
priorityClassName: ""
topologySpreadConstraints: []
affinity: {}

# A dedicated ServiceAccount per app; set create: false and name to reuse
# an existing one instead.
serviceAccount:
  create: true
  name: ""
  annotations: {}

# Maps declared ports to the pod's container ports (see deployment.yaml,
# which renders container ports from this same list).
service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP

# Additional annotations for the Service only, merged with
# commonAnnotations (serviceAnnotations wins on conflict, being the more
# specific of the two).
serviceAnnotations: {}

# Rendered into a ConfigMap when non-empty; omitted entirely otherwise.
config: {}

# An RWO Longhorn PVC. Enabling it forces the Deployment to
# `strategy: Recreate` + `replicas: 1` (see deployment.yaml) since a Longhorn
# RWO volume cannot be multi-attached during a rollout, and it must never be
# paired with autoscaling — hpa.yaml gates on persistence.enabled the same
# way this chart's replica logic does.
persistence:
  enabled: false
  size: 1Gi
  storageClass: longhorn
  mountPath: /data
  existingClaim: ""

# Cluster-only by default (routing.enabled: false) — no
# HTTPRoute/Certificate/ReferenceGrant renders until routing is turned on (see
# the routing.enabled gate in each of those templates). When enabled, the
# chart exposes this app's Service through the lab's one shared Traefik
# Gateway and issues it a letsencrypt certificate.
routing:
  enabled: false
  # Hostname(s) the HTTPRoute matches and the Certificate's dnsNames are
  # derived from.
  hostnames: []
  # ParentRef to the shared Gateway — name/namespace/sectionName are all
  # overridable per app; there is exactly one Gateway on this lab.
  gateway:
    name: shared-gateway
    # Defaults to this release's namespace when unset.
    namespace: ""
    # Optional; omitted from the parentRef when unset (matches any listener).
    sectionName: ""
  # TLS is on by default whenever routing is enabled — opt out per app if
  # a route genuinely needs to stay HTTP-only.
  tls:
    enabled: true
    issuerRef:
      name: letsencrypt
      kind: ClusterIssuer
    # Defaults to "<fullname>-tls" when unset.
    secretName: ""

# Opt-in HPA. Mutually exclusive with persistence.enabled — a Longhorn
# RWO volume can only be attached to one pod, so the chart suppresses the HPA
# (and keeps the Deployment's static replicas) whenever persistence is on,
# regardless of this flag (see deployment.yaml/hpa.yaml).
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # Omitted from the HPA's metrics when unset.
  targetMemoryUtilizationPercentage: ""

# Opt-in PDB. minAvailable/maxUnavailable are mutually exclusive; set
# maxUnavailable to use it instead of the default minAvailable.
pdb:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

# Opt-in observability surface, off by default. Scrape annotations
# render on the pod template via the generic podAnnotations merge mechanism
# (_metadata.tpl); the ServiceMonitor (monitoring.coreos.com/v1,
# templates/servicemonitor.yaml) requires the prometheus-operator CRDs to
# already be installed cluster-side.
metrics:
  scrape:
    enabled: false
    # Port Prometheus scrapes /metrics from — usually a container port
    # already declared under service.ports.
    port: 9090
    path: /metrics
  serviceMonitor:
    enabled: false
    # Must match a port name already declared under service.ports; the
    # ServiceMonitor selects this app's Service by that named port.
    port: metrics
    path: /metrics
    # Omitted from the ServiceMonitor endpoint when unset (falls back to the
    # Prometheus Operator's own global scrape interval).
    interval: ""

# Opt-in default-deny-ingress NetworkPolicy. When enabled, only the
# configured gateway namespace/pods may reach this app; everything else is
# denied by default. Egress stays unrestricted unless additionalEgress rules
# are supplied.
networkPolicy:
  enabled: false
  gateway:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: traefik
    # Optional; narrows the allow rule to specific pods within the gateway
    # namespace when set.
    podSelector: {}
  # Native NetworkPolicyEgressRule entries, e.g. to allow DNS or an external API:
  #   additionalEgress:
  #     - to:
  #         - namespaceSelector: {}
  #       ports:
  #         - protocol: UDP
  #           port: 53
  additionalEgress: []
