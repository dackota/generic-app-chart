name: Renovate

# Scheduled self-hosted Renovate runner (see renovate.json at the repo root
# for the base config). Mints a short-lived GitHub App (dk-renovate-bot)
# installation token so Renovate's commits/PRs are attributed to the App --
# not GITHUB_TOKEN -- consistent with how release-please.yml authenticates
# in this repo.
#
# Hardening:
#   - every `uses:` is pinned to a full commit SHA (trailing comment records
#     the version tag);
#   - permissions default to `contents: read` -- Renovate authenticates against
#     GitHub with the minted App token, so the workflow's own GITHUB_TOKEN
#     never needs write access;
#   - RENOVATE_REPOSITORIES pins the run to this repo only, so the (shared)
#     App installation on other repos in this account can't leak into this
#     schedule.

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate a token for the dk-renovate-bot App
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          # Scoped to exactly what Renovate needs (least privilege): contents +
          # pull-requests to open update PRs, issues for the Dependency
          # Dashboard, workflows because the github-actions manager pushes
          # commits touching .github/workflows/* (a scope GitHub requires
          # separately from contents).
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
          permission-workflows: write

      - name: Run Renovate
        uses: renovatebot/github-action@b50d2ba2bd928235abdcc14d06dfafc217f1c565 # v46.1.18
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # Attribute Renovate's commits/PRs to the App bot instead of the
          # action's default "renovate-bot" identity. The email must use the
          # App bot's numeric user id (resolved via
          # `gh api users/dk-renovate-bot%5Bbot%5D`) for GitHub to recognize
          # it as a real account and render the App's avatar on the commit.
          RENOVATE_GIT_AUTHOR: "dk-renovate-bot[bot] <300303047+dk-renovate-bot[bot]@users.noreply.github.com>"
        with:
          token: ${{ steps.app-token.outputs.token }}
