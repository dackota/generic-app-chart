{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "generic-app-chart.serviceAccountName" . }}
  labels:
    {{- include "generic-app-chart.labels" . | nindent 4 }}
  {{- with (include "generic-app-chart.serviceAccountAnnotations" .) }}
  annotations:
    {{- nindent 4 . }}
  {{- end }}
{{- end }}
