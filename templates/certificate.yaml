{{/*
M5 networking — R22. Issues TLS for the route's hostname(s) via cert-manager;
suppressed when routing is disabled (R24) or TLS is opted out per app.
*/}}
{{- if and .Values.routing.enabled .Values.routing.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "generic-app-chart.fullname" . }}
  labels:
    {{- include "generic-app-chart.labels" . | nindent 4 }}
  {{- with (include "generic-app-chart.annotations" .) }}
  annotations:
    {{- nindent 4 . }}
  {{- end }}
spec:
  secretName: {{ include "generic-app-chart.tlsSecretName" . }}
  dnsNames:
    {{- toYaml .Values.routing.hostnames | nindent 4 }}
  issuerRef:
    name: {{ .Values.routing.tls.issuerRef.name }}
    kind: {{ .Values.routing.tls.issuerRef.kind }}
{{- end }}
