{{- $volumeMounts := include "generic-app-chart.volumeMounts" . -}}
{{- $volumes := include "generic-app-chart.volumes" . -}}
{{/* R36: the primary service port backs the readiness default and any
port-less probe shorthand — see templates/_probes.tpl. */}}
{{- $primaryPort := "" -}}
{{- if .Values.service.ports -}}
{{- $primaryPort = (first .Values.service.ports).targetPort -}}
{{- end -}}
{{- $livenessProbe := include "generic-app-chart.probe" (dict "value" .Values.livenessProbe "port" $primaryPort "default" false "name" "livenessProbe") -}}
{{- $readinessProbe := include "generic-app-chart.probe" (dict "value" .Values.readinessProbe "port" $primaryPort "default" true "name" "readinessProbe") -}}
{{- $startupProbe := include "generic-app-chart.probe" (dict "value" .Values.startupProbe "port" $primaryPort "default" false "name" "startupProbe") -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "generic-app-chart.fullname" . }}
  labels:
    {{- include "generic-app-chart.labels" . | nindent 4 }}
  {{- with (include "generic-app-chart.annotations" .) }}
  annotations:
    {{- nindent 4 . }}
  {{- end }}
spec:
  {{- if .Values.persistence.enabled }}
  # R19: persistence forces a single replica — a Longhorn RWO volume can only
  # be attached to one pod at a time, so a rolling update would deadlock.
  replicas: 1
  {{- else if .Values.autoscaling.enabled }}
  # R25: omitted — the HPA (hpa.yaml) owns replica count once autoscaling is
  # active; setting a static value here would fight the HPA on every sync.
  {{- else }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  {{- if .Values.persistence.enabled }}
  # R19: Recreate (not RollingUpdate) so the old pod detaches the RWO volume
  # before the new one attaches it.
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "generic-app-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with (include "generic-app-chart.podAnnotations" .) }}
      annotations:
        {{- nindent 8 . }}
      {{- end }}
      labels:
        {{- include "generic-app-chart.podLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "generic-app-chart.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- include "generic-app-chart.podSecurityContext" . | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- include "generic-app-chart.containerSecurityContext" . | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.service.ports }}
          ports:
            {{- range . }}
            - name: {{ .name }}
              containerPort: {{ .targetPort }}
              protocol: {{ .protocol | default "TCP" }}
            {{- end }}
          {{- end }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $livenessProbe }}
          livenessProbe:
            {{- nindent 12 . }}
          {{- end }}
          {{- with $readinessProbe }}
          readinessProbe:
            {{- nindent 12 . }}
          {{- end }}
          {{- with $startupProbe }}
          startupProbe:
            {{- nindent 12 . }}
          {{- end }}
          {{- if .Values.lifecycle }}
          lifecycle:
            {{- toYaml .Values.lifecycle | nindent 12 }}
          {{- else if hasKey .Values.preStop "sleepSeconds" }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ .Values.preStop.sleepSeconds }}"]
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with $volumeMounts }}
          volumeMounts:
            {{- . | nindent 12 }}
          {{- end }}
      {{- with $volumes }}
      volumes:
        {{- . | nindent 6 }}
      {{- end }}
