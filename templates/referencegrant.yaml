{{/*
Networking (ADR 0001: app-owned HTTPRoute/Certificate, Gateway-side
ReferenceGrant for cross-namespace TLS only). This chart's HTTPRoute and
Certificate live in the app's own release namespace, so the Route's
backendRef to this chart's own Service never crosses a namespace boundary and
needs no grant. The one cross-namespace reference this model creates is the
Gateway's own listener `certificateRefs` reading this namespace's TLS
Secret — authorized here, and only when TLS is actually enabled (no Secret
exists to grant otherwise) and the Gateway lives in a different namespace
than this release (omitted entirely in cluster-only mode, or when the
Gateway shares this namespace).
*/}}
{{- if and .Values.routing.enabled .Values.routing.tls.enabled (ne (include "generic-app-chart.gatewayNamespace" .) .Release.Namespace) }}
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: {{ include "generic-app-chart.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "generic-app-chart.labels" . | nindent 4 }}
  {{- with (include "generic-app-chart.annotations" .) }}
  annotations:
    {{- nindent 4 . }}
  {{- end }}
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: {{ include "generic-app-chart.gatewayNamespace" . }}
  to:
    - group: ""
      kind: Secret
      name: {{ include "generic-app-chart.tlsSecretName" . }}
{{- end }}
