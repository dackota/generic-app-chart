{{/*
M5 networking — R21. Renders the app's route through the lab's one shared
Gateway; suppressed entirely in cluster-only mode (R24, routing.enabled: false).
*/}}
{{- if .Values.routing.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "generic-app-chart.fullname" . }}
  labels:
    {{- include "generic-app-chart.labels" . | nindent 4 }}
spec:
  hostnames:
    {{- toYaml .Values.routing.hostnames | nindent 4 }}
  parentRefs:
    - name: {{ .Values.routing.gateway.name }}
      namespace: {{ include "generic-app-chart.gatewayNamespace" . }}
      {{- with .Values.routing.gateway.sectionName }}
      sectionName: {{ . }}
      {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "generic-app-chart.fullname" . }}
          port: {{ (index .Values.service.ports 0).port }}
{{- end }}
