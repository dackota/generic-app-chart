{{/*
Scaling & disruption. Suppressed whenever persistence is enabled
(persistence and autoscaling are mutually exclusive) — a Longhorn RWO volume
can only be attached to one pod, so the chart never lets the HPA drive
replica count alongside it, regardless of autoscaling.enabled.
*/}}
{{- if and .Values.autoscaling.enabled (not .Values.persistence.enabled) }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "generic-app-chart.fullname" . }}
  labels:
    {{- include "generic-app-chart.labels" . | nindent 4 }}
  {{- with (include "generic-app-chart.annotations" .) }}
  annotations:
    {{- nindent 4 . }}
  {{- end }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "generic-app-chart.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
