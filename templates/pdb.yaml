{{/*
Scaling & disruption. minAvailable/maxUnavailable are mutually
exclusive on a PodDisruptionBudget spec — maxUnavailable wins when the caller
sets it, otherwise minAvailable (which defaults on) applies. Renders only when
the effective replica count (see the .effectiveReplicaCount helper) is > 1 —
never under the persistence-forced replicas: 1 or a single static
replica — so the budget can never block every replica from draining at once.
*/}}
{{- if and .Values.pdb.enabled (gt (include "generic-app-chart.effectiveReplicaCount" . | int) 1) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "generic-app-chart.fullname" . }}
  labels:
    {{- include "generic-app-chart.labels" . | nindent 4 }}
  {{- with (include "generic-app-chart.annotations" .) }}
  annotations:
    {{- nindent 4 . }}
  {{- end }}
spec:
  {{- if .Values.pdb.maxUnavailable }}
  maxUnavailable: {{ .Values.pdb.maxUnavailable }}
  {{- else }}
  minAvailable: {{ .Values.pdb.minAvailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "generic-app-chart.selectorLabels" . | nindent 6 }}
{{- end }}
